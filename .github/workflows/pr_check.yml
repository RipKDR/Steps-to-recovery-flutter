name: PR Gate

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/**/*.md"
      - "LICENSE"

concurrency:
  group: pr-gate-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Analyze · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: PR quality gate
        shell: pwsh
        run: ./tool/ci.ps1 pr-gate

      - name: Coverage gate
        run: dart run tool/coverage_gate.dart --file coverage/lcov.info --min 20
