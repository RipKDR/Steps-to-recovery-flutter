name: PR Check

on:
  pull_request:
    branches: [main]

jobs:
  check:
    name: Analyze · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate localizations
        run: flutter gen-l10n

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Test
        run: flutter test
