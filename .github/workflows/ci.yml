name: Main Build

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/**/*.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: main-build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Analyze · Test · Build APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.6"
          channel: stable
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Decode keystore (CI signing)
        if: ${{ secrets.KEY_STORE_BASE64 != '' }}
        env:
          KEY_STORE_BASE64: ${{ secrets.KEY_STORE_BASE64 }}
        run: |
          echo "$KEY_STORE_BASE64" | base64 --decode > android/app/steps-recovery-release.jks
          echo "KEY_STORE_FILE=steps-recovery-release.jks" >> $GITHUB_ENV

      - name: Main quality/build gate
        shell: pwsh
        env:
          KEY_STORE_FILE: ${{ env.KEY_STORE_FILE }}
          KEY_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./tool/ci.ps1 main-build

      - name: Coverage gate
        run: dart run tool/coverage_gate.dart --file coverage/lcov.info --min 20

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: steps-recovery-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14
