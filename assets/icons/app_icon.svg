<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1024" height="1024" fill="#0A0A0A"/>
  
  <!-- Recovery Stairs Icon - Symbolizing progress, one step at a time -->
  <g transform="translate(512, 512)">
    <!-- Outer glow effect -->
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      
      <!-- Gradient for the stairs -->
      <linearGradient id="stairGradient" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#FBBF24;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
      </linearGradient>
      
      <!-- Shadow -->
      <dropShadow id="shadow" dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </defs>
    
    <!-- Three ascending steps representing the recovery journey -->
    <g filter="url(#glow)">
      <!-- Step 1 (Bottom) -->
      <rect x="-180" y="120" width="120" height="40" rx="8" fill="url(#stairGradient)"/>
      
      <!-- Step 2 (Middle) -->
      <rect x="-60" y="40" width="120" height="40" rx="8" fill="url(#stairGradient)"/>
      
      <!-- Step 3 (Top) -->
      <rect x="60" y="-40" width="120" height="40" rx="8" fill="url(#stairGradient)"/>
    </g>
    
    <!-- Infinity symbol overlay - representing continuous recovery -->
    <g transform="translate(0, -180)" opacity="0.3">
      <path d="M -80,0 C -80,-40 -40,-80 0,-80 C 40,-80 80,-40 80,0 C 80,40 40,80 0,80 C -40,80 -80,40 -80,0 Z M 0,0 C 20,0 40,-20 40,-40 C 40,-60 20,-80 0,-80 C -20,-80 -40,-60 -40,-40 C -40,-20 -20,0 0,0 Z" 
            fill="#F59E0B" 
            stroke="none"/>
    </g>
    
    <!-- Central circle - representing unity and wholeness -->
    <circle cx="0" cy="-160" r="24" fill="#F59E0B" opacity="0.8"/>
  </g>
  
  <!-- Subtle border for polish -->
  <rect x="8" y="8" width="1008" height="1008" rx="192" fill="none" stroke="#1A1A1A" stroke-width="16"/>
</svg>
