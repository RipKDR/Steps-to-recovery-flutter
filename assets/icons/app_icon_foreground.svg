<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Android Adaptive Icon Foreground - Transparent Background -->
  
  <g transform="translate(512, 512)">
    <defs>
      <!-- Gradient for the stairs -->
      <linearGradient id="stairGradient" x1="0%" y1="100%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#FBBF24;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
      </linearGradient>
      
      <!-- Glow effect -->
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
        <feMerge>
          <feMergeNode in="coloredBlur"/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
    </defs>
    
    <!-- Three ascending steps - Recovery journey -->
    <g filter="url(#glow)">
      <!-- Step 1 (Bottom) -->
      <rect x="-180" y="120" width="120" height="40" rx="8" fill="url(#stairGradient)"/>
      
      <!-- Step 2 (Middle) -->
      <rect x="-60" y="40" width="120" height="40" rx="8" fill="url(#stairGradient)"/>
      
      <!-- Step 3 (Top) -->
      <rect x="60" y="-40" width="120" height="40" rx="8" fill="url(#stairGradient)"/>
    </g>
    
    <!-- Unity circle at top -->
    <circle cx="0" cy="-160" r="24" fill="#F59E0B" opacity="0.9"/>
  </g>
</svg>
