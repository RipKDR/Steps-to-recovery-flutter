<?xml version="1.0" encoding="UTF-8"?>
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Splash Screen Logo - Simplified version -->
  
  <defs>
    <!-- Gradient -->
    <linearGradient id="splashGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow -->
    <filter id="splashGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Centered in 512x512 canvas -->
  <g transform="translate(256, 256)">
    <!-- Three ascending steps -->
    <g filter="url(#splashGlow)">
      <!-- Step 1 -->
      <rect x="-90" y="60" width="60" height="20" rx="4" fill="url(#splashGradient)"/>
      
      <!-- Step 2 -->
      <rect x="-30" y="20" width="60" height="20" rx="4" fill="url(#splashGradient)"/>
      
      <!-- Step 3 -->
      <rect x="30" y="-20" width="60" height="20" rx="4" fill="url(#splashGradient)"/>
    </g>
    
    <!-- Unity circle -->
    <circle cx="0" cy="-80" r="12" fill="#F59E0B" opacity="0.9"/>
  </g>
</svg>
