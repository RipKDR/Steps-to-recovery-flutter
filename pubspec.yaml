name: steps_recovery_flutter
description: "Privacy-first recovery companion for 12-step programs"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # Local Storage
  path_provider: ^2.1.5

  # Encryption & Security
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.6
  local_auth: ^3.0.1

  # Storage
  shared_preferences: ^2.5.3

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  workmanager: ^0.9.0+3

  # Network & API
  http: ^1.2.2
  supabase_flutter: ^2.8.0

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.4
  smooth_page_indicator: ^2.0.1

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.1.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.0
  equatable: ^2.0.7
  logger: ^2.5.0
  url_launcher: ^6.3.1
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  battery_plus: ^7.0.0
  device_info_plus: ^12.3.0

  # AI/ML
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  # Removed riverpod_generator and isar_generator due to version conflicts
  # These can be added later if code generation is needed
  json_serializable: ^6.9.0
  json_annotation: ^4.9.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
