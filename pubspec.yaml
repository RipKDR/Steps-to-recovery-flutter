name: steps_recovery_flutter
description: "Privacy-first recovery companion for 12-step programs"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Local Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Encryption & Security
  encrypt: ^5.0.3
  flutter_secure_storage: ^9.2.4
  crypto: ^3.0.6
  local_auth: ^2.3.0

  # Storage
  shared_preferences: ^2.5.3

  # Notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  workmanager: ^0.6.0

  # Network & API
  http: ^1.2.2
  supabase_flutter: ^2.8.0

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^0.69.2
  percent_indicator: ^4.2.4
  smooth_page_indicator: ^1.2.0+3

  # Forms & Validation
  flutter_form_builder: ^9.7.0
  form_builder_validators: ^11.1.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  collection: ^1.19.0
  equatable: ^2.0.7
  logger: ^2.5.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  package_info_plus: ^8.1.2
  connectivity_plus: ^6.1.2
  battery_plus: ^6.1.2
  device_info_plus: ^11.2.0

  # AI/ML
  google_generative_ai: ^0.4.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.5
  isar_generator: ^3.1.0+1
  json_serializable: ^6.9.0
  json_annotation: ^4.9.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
