name: steps_recovery_flutter
description: "Privacy-first recovery companion for 12-step programs"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # Local Storage
  path_provider: ^2.1.5

  # Encryption & Security
  encrypt: ^5.0.3
  flutter_secure_storage: ^10.0.0
  crypto: ^3.0.6
  local_auth: ^3.0.1

  # Storage
  shared_preferences: ^2.5.3

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  workmanager: ^0.9.0+3

  # Network & API
  http: ^1.2.2
  dio: ^5.4.0
  supabase_flutter: ^2.8.0

  # UI Enhancements
  lottie: ^3.1.0
  flutter_staggered_animations: ^1.1.1
  haptic_feedback: ^0.6.4+3

  # Typography
  google_fonts: ^8.0.2

  # UI Components
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.2
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  percent_indicator: ^4.2.4
  smooth_page_indicator: ^2.0.1

  # Audio
  just_audio: ^0.10.5
  audio_session: ^0.2.3

  # Speech & Recording
  speech_to_text: ^7.0.0
  record: ^6.2.0
  permission_handler: ^12.0.1

  # Forms & Validation
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.1.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.0
  equatable: ^2.0.7
  logger: ^2.5.0
  url_launcher: ^6.3.1
  share_plus: ^12.0.1
  package_info_plus: ^9.0.0
  connectivity_plus: ^7.0.0
  battery_plus: ^7.0.0
  device_info_plus: ^12.3.0

  # AI/ML
  google_generative_ai: ^0.4.6

  # Production
  # sentry_flutter: ^9.15.0  # Temporarily disabled for build
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  path_provider_platform_interface: ^2.1.2
  firebase_core: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  mockito: ^5.4.4
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  freezed: ^3.2.5
  json_serializable: ^6.7.1
  very_good_analysis: ^10.2.0
  image: ^4.5.4

  flutter_secure_storage_platform_interface: any
flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/audio/breathing/
    - assets/audio/body_scan/
    - assets/audio/grounding/
    - assets/audio/craving/
    - assets/audio/sleep/
    - assets/audio/anxiety/

# App icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0A0A0A"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"

# Splash screen configuration
flutter_native_splash:
  color: "#0A0A0A"
  image: "assets/icons/splash_logo.png"
  android_12:
    color: "#0A0A0A"
    icon_background_color: "#0A0A0A"
    image: "assets/icons/splash_logo.png"
  ios: true
  web: true
